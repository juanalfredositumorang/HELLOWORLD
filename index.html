<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World - Animated</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <canvas id="bgCanvas"></canvas>

  <div class="ring" style="width:500px;height:500px;border-color:rgba(124,58,237,0.25);animation-duration:4s;"></div>
  <div class="ring" style="width:320px;height:320px;border-color:rgba(37,99,235,0.2);animation-duration:3s;animation-delay:1s;"></div>
  <div class="ring" style="width:180px;height:180px;border-color:rgba(192,132,252,0.15);animation-duration:5s;animation-delay:0.5s;"></div>

  <div class="hw-wrap">
    <div class="letters-row">
      <div class="word" id="word1"></div>
      <div class="space"></div>
      <div class="word" id="word2"></div>
      <div class="space"></div>
      <div class="word" id="word3"></div>
    </div>
    <div class="subtitle">Selamat Datang di Dunia Kode</div>
    <div class="glow-bar"></div>
    <div class="hint">Klik atau hover huruf untuk efek ✦</div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
